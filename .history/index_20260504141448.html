<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMPATIA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [v-cloak] { display: none; }
    html, body, #app {
      width: 100%;
      height: 100%;
      background: #fff;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
    }
    .game-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #121212;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: auto;
      cursor: pointer;
      max-width: none;
      max-height: none;
      border-radius: 16px;
    }
    .vue-hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: #fff;
    }
    .hint-chip {
      position: absolute;
      left: 50%;
      top: var(--game-canvas-top, 0px);
      transform: translateX(-50%);
      padding: 4px;
      background: rgba(90,90,90,0.88);
      color: rgba(255,255,255,0.82);
      font-family: Inter, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 14px;
      line-height: 1;
      white-space: nowrap;
      
    }
    .hud-asset {
      position: absolute;
      pointer-events: none;
    }
    .hud-img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
    }
    .tasks-paper {
      left: 22px;
      top: 24px;
      width: clamp(150px, 16vw, 250px);
      filter: drop-shadow(4px 8px 3px rgba(0,0,0,0.22));
    }
    .tasks-lines {
      position: absolute;
      left: 28%;
      top: 22%;
      width: 52%;
      color: #d81716;
      font-size: clamp(7px, 0.74vw, 11px);
      line-height: 1.1;
      font-family: Inter, Arial, Helvetica, sans-serif;
      font-weight: 700;
      transform: rotate(-1deg);
    }
    .tasks-title {
      font-size: 1.12em;
      margin-bottom: 3px;
    }
    .tasks-section {
      margin-top: 3px;
    }
    .tasks-heading {
      color: #9d2e22;
      font-size: 0.78em;
      text-transform: uppercase;
      letter-spacing: 0;
      margin-bottom: 0.5rem;
    }
    .tasks-item {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 1px;
    }
    .clock-object {
      right: 22px;
      top: 38px;
      width: clamp(96px, 12vw, 160px);
      filter: drop-shadow(3px 5px 2px rgba(0,0,0,0.28));
    }
    .clock-text {
      position: absolute;
      inset: 28% 17% 24% 14%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9d2e22;
      font: 700 clamp(16px, 2.4vw, 31px)/1 monospace;
      transform: rotate(-1deg);
    }
    .notice {
      position: absolute;
      right: -18px;
      top: 132px;
      width: min(680px, 56vw);
      aspect-ratio: 4.55;
      min-height: 74px;
      padding: 24px 34px 16px 178px;
      background-image: url('assets/img/objetos/notificacion.png');
      background-repeat: no-repeat;
      background-size: 100% auto;
      background-position: center;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(11px, 1.2vw, 15px);
      line-height: 1.3;
      text-shadow: 0 1px 2px rgba(0,0,0,0.55);
      filter: drop-shadow(3px 8px 3px rgba(0,0,0,0.18));
      overflow: hidden;
    }
    .notice-text {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
    }
    .fade-layer {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
    }
    .vue-hud.is-title .tasks-paper,
    .vue-hud.is-title .clock-object,
    .vue-hud.is-title .notice,
    .vue-hud.is-title .hint-chip {
      display: none;
    }
    @media (max-width: 720px) {
      .tasks-paper { width: 120px; left: 8px; top: 10px; }
      .tasks-lines { font-size: 6px; }
      .clock-object { width: 84px; right: 8px; top: 12px; }
      .notice { top: 76px; width: 330px; min-height: 54px; padding: 15px 18px 10px 92px; font-size: 10px; }
      .hint-chip { font-size: 10px; max-width: calc(100vw - 24px); overflow: hidden; text-overflow: ellipsis; }
    }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <main class="game-shell">
      <canvas id="c"></canvas>
      <section class="vue-hud" :class="{ 'is-title': titleActive }">
        <div class="hud-asset tasks-paper">
          <img class="hud-img" src="assets/img/objetos/tareas.png" alt="">
          <div class="tasks-lines">
            <div class="tasks-title">Tareas</div>
            <div class="tasks-section" v-if="currentTasks.length">
              <div class="tasks-heading">Ahora</div>
              <div class="tasks-item" v-for="(task, i) in currentTasks" :key="'current-' + i + '-' + task">{{ task }}</div>
            </div>
            <div class="tasks-section" v-if="completedTasks.length">
              <div class="tasks-heading">Hechas</div>
              <div class="tasks-item" v-for="(task, i) in completedTasks.slice(-3)" :key="'done-' + i + '-' + task">✓ {{ task }}</div>
            </div>
            <div class="tasks-section" v-if="missedTasks.length">
              <div class="tasks-heading">Faltan</div>
              <div class="tasks-item" v-for="(task, i) in missedTasks.slice(-4)" :key="'missed-' + i + '-' + task">• {{ task }}</div>
            </div>
          </div>
        </div>
        <div class="hud-asset clock-object">
          <img class="hud-img" src="assets/img/objetos/relojVacioContador.png" alt="">
          <div class="clock-text">{{ clock }}</div>
        </div>
        <div class="notice" v-show="notification"><span class="notice-text">{{ notification }}</span></div>
        <div class="hint-chip">A / D para moverte · clic para interactuar</div>
        <div class="fade-layer" ref="fadeLayer"></div>
      </section>
    </main>
  </div>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
